services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      NODE_ENV: production
      PORT: 80
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: field_games
      DB_USER: field_games
      DB_PASS: field_games_password
      APP_URL: ${APP_URL:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET:-zmien-to-w-portainerze}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-grimordev@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-PrywatnieNr7!}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      default:
      proxy:
        aliases:
          - hufc-app
          - hufc-app-1

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: field_games
      POSTGRES_USER: field_games
      POSTGRES_PASSWORD: field_games_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U field_games -d field_games"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}
