services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: field_games
      DB_USER: field_games
      DB_PASS: field_games_password
      APP_URL: ${APP_URL:-http://localhost:8080}
    volumes:
      - app_uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: field_games
      POSTGRES_USER: field_games
      POSTGRES_PASSWORD: field_games_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U field_games -d field_games"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  app_uploads:
