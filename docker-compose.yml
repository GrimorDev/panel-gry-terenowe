services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: field_games
      DB_USER: field_games
      DB_PASS: field_games_password
      APP_URL: ${APP_URL:-http://localhost:8080}
    volumes:
      - app_uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      proxy:
        aliases:
          - hufc-app
          - hufc-app-1

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: field_games
      POSTGRES_USER: field_games
      POSTGRES_PASSWORD: field_games_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U field_games -d field_games"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  app_uploads:

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-nginx-proxy-manager_default}
