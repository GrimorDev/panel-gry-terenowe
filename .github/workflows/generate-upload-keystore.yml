name: Generate Android upload keystore (one-off)

on:
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore + password
        run: |
          # Wspolne haslo do store i key - PKCS12 (domyslny format keytool na nowych Javach)
          # nie obsluguje poprawnie roznych hasel, powoduje blad przy odczycie w Gradle.
          PASS=$(openssl rand -base64 24 | tr -d '/+=' | head -c 32)
          mkdir -p out
          keytool -genkeypair -v \
            -keystore out/upload-keystore.jks \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=Moj Hufiec, OU=Mobile, O=vipile.com, L=PL, S=PL, C=PL"
          {
            echo "keystore_password=$PASS"
            echo "key_password=$PASS"
            echo "key_alias=upload"
          } > out/credentials.txt
          base64 -w0 out/upload-keystore.jks > out/upload-keystore.jks.b64
          keytool -list -v -keystore out/upload-keystore.jks -storepass "$PASS" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-upload-keystore
          path: |
            out/upload-keystore.jks
            out/upload-keystore.jks.b64
            out/credentials.txt
          retention-days: 1
