name: Generate Android upload keystore (one-off)

on:
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore + passwords
        run: |
          KS_PASS=$(openssl rand -base64 24 | tr -d '/+=' | head -c 32)
          KEY_PASS=$(openssl rand -base64 24 | tr -d '/+=' | head -c 32)
          mkdir -p out
          keytool -genkeypair -v \
            -keystore out/upload-keystore.jks \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            -dname "CN=Moj Hufiec, OU=Mobile, O=vipile.com, L=PL, S=PL, C=PL"
          {
            echo "keystore_password=$KS_PASS"
            echo "key_password=$KEY_PASS"
            echo "key_alias=upload"
          } > out/credentials.txt
          base64 -w0 out/upload-keystore.jks > out/upload-keystore.jks.b64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-upload-keystore
          path: |
            out/upload-keystore.jks
            out/upload-keystore.jks.b64
            out/credentials.txt
          retention-days: 1
