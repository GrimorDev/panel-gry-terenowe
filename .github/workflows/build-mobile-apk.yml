name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: Backend URL, for example https://vipile.com
        required: true
        default: https://vipile.com

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/hufc_mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create native project files
        run: flutter create --platforms=android .

      - name: Ensure Android permissions
        run: |
          python - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET"/>',
              '<uses-permission android:name="android.permission.CAMERA"/>',
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>',
              '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>',
          ]
          missing = [permission for permission in permissions if permission not in text]
          if missing:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\\n    ' + '\\n    '.join(missing),
                  1,
              )
              manifest.write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_URL=${{ inputs.api_url }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: moj-hufiec-android-apk
          path: mobile/hufc_mobile/build/app/outputs/flutter-apk/app-release.apk
