name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: Backend URL, for example https://vipile.com
        required: true
        default: https://vipile.com

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/hufc_mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create native project files
        run: flutter create --platforms=android .

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure Android branding and permissions
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          # Nazwa pakietu na Google Play jest permanentna - musi się dokładnie zgadzać
          # z tym, co zostało utworzone w Play Console.
          package_name = "com.vipile.mojhufiec"

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET"/>',
              '<uses-permission android:name="android.permission.CAMERA"/>',
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>',
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>',
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>',
              '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>',
              '<uses-permission android:name="android.permission.USE_BIOMETRIC"/>',
          ]
          missing = [permission for permission in permissions if permission not in text]
          if missing:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\\n    ' + '\\n    '.join(missing),
                  1,
              )
          text = text.replace('android:label="hufc_mobile"', 'android:label="Mój Hufiec"')
          text = text.replace('android:label="hufc mobile"', 'android:label="Mój Hufiec"')
          # local_auth wymaga FragmentActivity zamiast zwyklej Activity - podmieniamy
          # glowna aktywnosc na wbudowana klase Fluttera zamiast dotykac MainActivity.kt.
          text = text.replace('android:name=".MainActivity"', 'android:name="io.flutter.embedding.android.FlutterFragmentActivity"')
          bg_service_tag = '<service android:name="id.flutter.flutter_background_service.BackgroundService" android:foregroundServiceType="dataSync"/>'
          if bg_service_tag not in text:
              text = text.replace('</application>', '    ' + bg_service_tag + '\\n    </application>', 1)
          manifest.write_text(text, encoding="utf-8")

          app_gradle_kts = Path("android/app/build.gradle.kts")
          if app_gradle_kts.exists():
              gradle = app_gradle_kts.read_text(encoding="utf-8")
              gradle = re.sub(r'namespace\s*=\s*"[^"]*"', f'namespace = "{package_name}"', gradle)
              gradle = re.sub(r'applicationId\s*=\s*"[^"]*"', f'applicationId = "{package_name}"', gradle)
              if "isCoreLibraryDesugaringEnabled" not in gradle:
                  gradle = gradle.replace(
                      "compileOptions {\n",
                      "compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n",
                      1,
                  )
              desugar_dep = 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")'
              if desugar_dep not in gradle:
                  if "dependencies {" in gradle:
                      gradle = gradle.replace("dependencies {\n", f"dependencies {{\n    {desugar_dep}\n", 1)
                  else:
                      gradle = gradle.rstrip() + f"\n\ndependencies {{\n    {desugar_dep}\n}}\n"
              app_gradle_kts.write_text(gradle, encoding="utf-8")

          app_gradle = Path("android/app/build.gradle")
          if app_gradle.exists():
              gradle = app_gradle.read_text(encoding="utf-8")
              gradle = re.sub(r"namespace\s+['\"][^'\"]*['\"]", f"namespace '{package_name}'", gradle)
              gradle = re.sub(r"applicationId\s+['\"][^'\"]*['\"]", f"applicationId '{package_name}'", gradle)
              if "coreLibraryDesugaringEnabled" not in gradle:
                  gradle = gradle.replace(
                      "compileOptions {\n",
                      "compileOptions {\n        coreLibraryDesugaringEnabled true\n",
                      1,
                  )
              desugar_dep = "coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'"
              if desugar_dep not in gradle:
                  if "dependencies {" in gradle:
                      gradle = gradle.replace("dependencies {\n", f"dependencies {{\n    {desugar_dep}\n", 1)
                  else:
                      gradle = gradle.rstrip() + f"\n\ndependencies {{\n    {desugar_dep}\n}}\n"
              app_gradle.write_text(gradle, encoding="utf-8")
          PY

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<KEYPROPS
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          KEYPROPS
          python - <<'PY'
          from pathlib import Path

          gradle_path = Path("android/app/build.gradle.kts")
          text = gradle_path.read_text(encoding="utf-8")
          if "keystoreProperties" not in text:
              text = (
                  'import java.util.Properties\n'
                  'import java.io.FileInputStream\n\n'
                  'val keystoreProperties = Properties()\n'
                  'val keystorePropertiesFile = rootProject.file("key.properties")\n'
                  'if (keystorePropertiesFile.exists()) {\n'
                  '    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n'
                  '}\n\n'
              ) + text
          if "signingConfigs {" not in text:
              signing_block = (
                  '    signingConfigs {\n'
                  '        create("release") {\n'
                  '            keyAlias = keystoreProperties["keyAlias"] as String?\n'
                  '            keyPassword = keystoreProperties["keyPassword"] as String?\n'
                  '            storeFile = keystoreProperties["storeFile"]?.let { file(it) }\n'
                  '            storePassword = keystoreProperties["storePassword"] as String?\n'
                  '        }\n'
                  '    }\n'
              )
              text = text.replace("    buildTypes {", signing_block + "    buildTypes {", 1)
          text = text.replace(
              'signingConfig = signingConfigs.getByName("debug")',
              'signingConfig = signingConfigs.getByName("release")',
          )
          gradle_path.write_text(text, encoding="utf-8")
          PY

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons -f flutter_launcher_icons_android.yaml

      - name: Analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_URL=${{ inputs.api_url }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: moj-hufiec-android-apk
          path: mobile/hufc_mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Build release App Bundle (for Google Play)
        run: flutter build appbundle --release --dart-define=API_URL=${{ inputs.api_url }}

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: moj-hufiec-android-aab
          path: mobile/hufc_mobile/build/app/outputs/bundle/release/app-release.aab
